<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Andrew's Webpage</title>
    <style>
        :root {
            --bg: #f4f4f4;
            --text: #222;
            --nav-bg: #333;
            --section-bg: white;
            --link: #0066cc;
        }

        /* Dark theme variables */
        [data-theme="dark"] {
            --bg: #121212;
            --text: #e0e0e0;
            --nav-bg: #1e1e1e;
            --section-bg: #1f1f1f;
            --link: #4da3ff;
        }

        /* Auto dark mode when theme = system */
        @media (prefers-color-scheme: dark) {
            [data-theme="system"] {
                --bg: #121212;
                --text: #e0e0e0;
                --nav-bg: #1e1e1e;
                --section-bg: #1f1f1f;
                --link: #4da3ff;
            }
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
        }

        nav {
            background-color: var(--nav-bg);
            padding: 10px 20px;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Theme selector */
        .theme-toggle {
            color: white;
            font-size: 16px;
        }

        .container {
            padding: 40px;
        }

        h1 {
            color: var(--text);
        }

        .section {
            background: var(--section-bg);
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }

        h2 {
            display: flex;
            align-items: center;
            color: var(--text);
        }

        /* FIXED IMAGE SIZING — consistent across all sections */
        .section img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            margin-right: 10px;
        }

        a {
            color: var(--link);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body data-theme="system">

    <nav>
        <div>
            <a href="#school">School</a>
            <a href="#minecraft">Minecraft</a>
            <a href="#gaming">Gaming</a>
        </div>

        <select class="theme-toggle" id="themeSelect">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
        </select>
    </nav>

    <div class="container">
        <h1>Andrew's Webpage</h1>

        <div class="section" id="school">
            <h2>
                <img src="https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f3eb.png" alt="School Icon">
                School Resources
            </h2>
            <ul>
                <li><a href="https://www.savvasrealize.com" target="_blank">Savvas Realize</a></li>
                <li><a href="https://launchpad.classlink.com" target="_blank">ClassLink</a></li>
            </ul>
        </div>

        <div class="section" id="minecraft">
            <h2>
                <img src="https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.19.2/assets/minecraft/textures/item/diamond_sword.png" alt="Minecraft Icon">
                Minecraft
            </h2>
            <ul>
                <li><a href="https://www.minecraft.net" target="_blank">Official Minecraft Website</a></li>
                <li><a href="https://www.curseforge.com/minecraft" target="_blank">Minecraft Mods (CurseForge)</a></li>
                <li><a href="https://minecraft.fandom.com/wiki/Minecraft_Wiki" target="_blank">Minecraft Wiki</a></li>
            </ul>
        </div>

        <div class="section" id="gaming">
            <h2>
                <img src="https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/1f3ae.png" alt="Gaming Icon">
                Gaming
            </h2>
            <ul>
                <li><a href="https://www.nintendo.com/switch/" target="_blank">Nintendo Switch 2 Info</a></li>
                <li><a href="https://www.pcgamingwiki.com" target="_blank">PC Gaming Resources</a></li>
                <li><a href="https://www.playstation.com/ps5/" target="_blank">PlayStation 5</a></li>
            </ul>
        </div>

    </div>

    <script>
        const themeSelect = document.getElementById("themeSelect");
        const body = document.body;

        // Load saved theme
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            body.setAttribute("data-theme", savedTheme);
            themeSelect.value = savedTheme;
        }

        themeSelect.addEventListener("change", () => {
            const theme = themeSelect.value;
            body.setAttribute("data-theme", theme);
            localStorage.setItem("theme", theme);
        });
    </script>

</body>
</html>
